; thempl example — {{ theme.name }} theme

[colors]
background = {{ theme.background }}
foreground = {{ theme.foreground }}
primary = {{ theme.blue }}
secondary = {{ theme.magenta }}
alert = {{ theme.red }}
success = {{ theme.green }}

[bar/main]
width = 100%
height = 32
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}

border-size = {{ border_width }}

; to_rgb filter: #7aa2f7 → (122,162,247)
; Useful for compatibility with older X applications
rgb_primary = {{ theme.blue | to_rgb }}
rgb_foreground = {{ fg | to_rgb }}

[module/battery]
type = internal/battery
full-at = 99
format-charging = <ramp-charging>  {{ theme.green }}charging{{ theme.foreground }}
format-discharging = <ramp-discharging>  {{ theme.yellow }}discharging{{ theme.foreground }}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M
format = <label>
label = {{ theme.cyan }}%date% %time%{{ theme.foreground }}

; Example: filter without hash prefix
; {{ theme.blue | nohash }}  →  7aa2f7
